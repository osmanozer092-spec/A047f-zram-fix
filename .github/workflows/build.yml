name: Build Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc

      - name: Build Kernel
        run: |
          # 1. Temizlik
         
          
          # 2. Defconfig yükle (kendi defconfig isminle değiştir)
          make ARCH=arm64 exynos850_defconfig 
          
          # 3. ZRAM ve ZSMALLOC'u kökten kapat (config dosyasını düzenle)
          # Bu komutlar, defconfig'deki ilgili ayarları bulur ve kapatır.
          
          
          # 4. Build scriptini çalıştır
          chmod +x build_kernel.sh
          ./build_kernel.sh
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Output
          path: out/arch/arm64/boot/Image.gz-dtb # (Senin build scriptinin çıkış yoluna göre değiştir)
